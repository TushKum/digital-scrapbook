services:
  db:
    image: postgres:16-alpine
    container_name: neervana-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: neervana
      POSTGRES_PASSWORD: neervana
      POSTGRES_DB: neervana
    ports:
      - '5432:5432'
    volumes:
      - neervana-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U neervana -d neervana']
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BASE_URL: /
    ports:
      - '8787:8787'
    environment:
      DATABASE_URL: postgresql://neervana:neervana@db:5432/neervana?schema=public
      API_PORT: '8787'
      NODE_ENV: production
      CORS_ORIGIN: '*'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  neervana-pgdata:
